name: apidash_cli
description: "Command-line interface for API Dash - execute and manage API requests from the terminal"
version: 0.0.1-dev
homepage: https://github.com/foss42/apidash

topics:
  - api
  - cli
  - http
  - testing

environment:
  sdk: ">=3.8.0 <4.0.0"

resolution: workspace

executables:
  apidash: apidash_cli

dependencies:
  args: ^2.5.0
  apidash_mcp: any
  apidash_shared_storage: any
  better_networking: any
  hive_ce: ^2.3.4
  http: ^1.6.0
  mason_logger: ^0.3.2
  path: ^1.8.3
  uuid: ^4.5.3

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.29.0
